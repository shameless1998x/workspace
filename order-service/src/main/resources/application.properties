# ==========================================
# 1. \u57FA\u672C\u4FE1\u606F
# ==========================================
spring.application.name=order-service
server.port=8082

# ==========================================
# 2. Nacos \u914D\u7F6E
# ==========================================
spring.cloud.nacos.discovery.server-addr=127.0.0.1:8848
spring.cloud.nacos.discovery.namespace=b964f1a0-a7ef-4584-bca4-b4f53f22d59e

# ==========================================
# Sentinel \u6838\u5FC3\u914D\u7F6E (\u539F\u751F Docker host \u6A21\u5F0F\u4E13\u7528)
# ==========================================

# 1. \u544A\u8BC9\u5FAE\u670D\u52A1\uFF1A\u63A7\u5236\u53F0\u5728\u672C\u5730\u7684 8858 \u7AEF\u53E3
spring.cloud.sentinel.transport.dashboard=127.0.0.1:8858

# 2. \u544A\u8BC9\u63A7\u5236\u53F0\uFF1A\u53BB\u672C\u5730\u627E\u5FAE\u670D\u52A1
# (\u56E0\u4E3A\u7528\u4E86 --net=host\uFF0CDocker\u91CC\u7684127.0.0.1\u5C31\u662F\u4F60Windows\u7684127.0.0.1)
spring.cloud.sentinel.transport.client-ip=127.0.0.1

# 3. \u3010\u6781\u5176\u91CD\u8981\u3011\u5FAE\u670D\u52A1\u4E0E\u63A7\u5236\u53F0\u901A\u4FE1\u7684\u4E13\u5C5E\u7AEF\u53E3
# \u5FC5\u987B\u6539\u4E3A 8720\uFF01\u4E3A\u4E86\u5B8C\u7F8E\u907F\u5F00 Sentinel \u63A7\u5236\u53F0\u5185\u90E8\u81EA\u5DF1\u5360\u7528\u7684 8719 \u7AEF\u53E3\uFF0C\u9632\u6B62\u201C\u81EA\u5DF1\u76D1\u63A7\u81EA\u5DF1\u201D\u7684\u4E4C\u9F99\u3002
spring.cloud.sentinel.transport.port=8720

# 4. \u5F00\u542F\u9965\u997F\u52A0\u8F7D (\u542F\u52A8\u65F6\u76F4\u63A5\u521D\u59CB\u5316\uFF0C\u4E0D\u7528\u7B49\u7B2C\u4E00\u6B21\u8BF7\u6C42)
spring.cloud.sentinel.eager=true

# ==========================================
# 4. Sentinel \u89C4\u5219\u6301\u4E45\u5316\u5230 Nacos
# ==========================================
spring.cloud.sentinel.datasource.flow.nacos.server-addr=127.0.0.1:8848
spring.cloud.sentinel.datasource.flow.nacos.namespace=b964f1a0-a7ef-4584-bca4-b4f53f22d59e
spring.cloud.sentinel.datasource.flow.nacos.dataId=order-service-flow-rules
spring.cloud.sentinel.datasource.flow.nacos.groupId=SENTINEL_GROUP
spring.cloud.sentinel.datasource.flow.nacos.data-type=json
spring.cloud.sentinel.datasource.flow.nacos.rule-type=flow

spring.rabbitmq.host=127.0.0.1
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
# \u5F00\u542F\u6D88\u8D39\u8005\u91CD\u8BD5
spring.rabbitmq.listener.simple.retry.enabled=true
# \u6700\u5927\u91CD\u8BD5 3 \u6B21
spring.rabbitmq.listener.simple.retry.max-attempts=3
# \u91CD\u8BD5\u95F4\u9694 2 \u79D2
spring.rabbitmq.listener.simple.retry.initial-interval=2000ms
# \u91CD\u70B9\uFF1A\u8FBE\u5230\u4E0A\u9650\u540E\uFF0C\u62D2\u7EDD\u6D88\u606F\uFF08\u8FD9\u6837\u6D88\u606F\u624D\u4F1A\u8FDB\u5165\u6B7B\u4FE1\u961F\u5217\uFF09
spring.rabbitmq.listener.simple.retry.republish-delivery-exceptions=false
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# ==========================================
# 5. Seata \u5206\u5E03\u5F0F\u4E8B\u52A1\u914D\u7F6E
# ==========================================
# \u5F00\u542F Seata
seata.enabled=true
# \u4F60\u7684\u670D\u52A1 ID\uFF0C\u901A\u5E38\u548C spring.application.name \u4E00\u81F4
seata.application-id=order-service
# \u4E8B\u52A1\u5206\u7EC4\u540D\uFF08\u53EF\u4EE5\u81EA\u5B9A\u4E49\uFF0C\u4F46\u6620\u5C04\u5173\u7CFB\u8981\u5BF9\u4E0A\uFF09
seata.tx-service-group=order_service_group

# \u5C06\u4E8B\u52A1\u5206\u7EC4\u6620\u5C04\u5230 TC \u96C6\u7FA4\u540D (Seata \u9ED8\u8BA4\u96C6\u7FA4\u540D\u5C31\u53EB default)
seata.service.vgroup-mapping.order_service_group=default

# \u914D\u7F6E\u6CE8\u518C\u4E2D\u5FC3\uFF1A\u544A\u8BC9\u5FAE\u670D\u52A1\u53BB Nacos \u7684\u54EA\u91CC\u627E Seata \u88C1\u5224
seata.registry.type=nacos
seata.registry.nacos.server-addr=127.0.0.1:8848
# \u91CD\u8981\uFF1A\u8FD9\u91CC\u5FC5\u987B\u5BF9\u5E94\u4F60 Nacos \u91CC\u663E\u793A\u7684\u90A3\u4E2A\u540D\u5B57
seata.registry.nacos.application=seata-server
# \u91CD\u8981\uFF1A\u8FD9\u91CC\u5FC5\u987B\u5BF9\u5E94\u4F60\u622A\u56FE\u91CC\u7684\u90A3\u4E2A\u5206\u7EC4\u540D
seata.registry.nacos.group=SEATA_GROUP
# \u5982\u679C Seata \u88C1\u5224\u5728 public \u7A7A\u95F4\uFF0C\u8FD9\u91CC\u5C31\u7559\u7A7A\uFF08\u6CE8\u610F\u4F60\u7684 Discovery \u5728\u7279\u5B9A\u7A7A\u95F4\uFF0C\u4F46 Seata \u53EF\u80FD\u5728 public\uFF09
seata.registry.nacos.namespace=
# ==========================================
# 6. \u6570\u636E\u5E93\u8FDE\u63A5\u914D\u7F6E (\u5FC5\u987B\u52A0\u4E0A\uFF0C\u5426\u5219 JPA \u65E0\u6CD5\u542F\u52A8)
# ==========================================
# \u8FD9\u91CC\u7684 your_db_name \u8BF7\u6362\u6210\u4F60\u521B\u5EFA undo_log \u8868\u7684\u90A3\u4E2A\u5E93\u540D
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/demo_db?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&useSSL=false
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA \u76F8\u5173\u914D\u7F6E\uFF1A\u663E\u793A SQL \u65B9\u4FBF\u8C03\u8BD5\uFF0C\u5E76\u81EA\u52A8\u66F4\u65B0\u8868\u7ED3\u6784
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update